<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #f6f8ff, #eef3ff);
        color: #1f2937;
      }

      .app {
        width: min(92vw, 560px);
        padding: 2rem;
        border-radius: 1.25rem;
        background: #ffffff;
        box-shadow: 0 20px 50px rgba(15, 23, 42, 0.12);
      }

      h1 {
        margin: 0 0 1rem;
        font-size: 1.8rem;
      }

      form {
        display: flex;
        gap: 0.75rem;
        margin-bottom: 1rem;
      }

      input {
        flex: 1;
        padding: 0.8rem 0.95rem;
        border: 1px solid #d7def0;
        border-radius: 999px;
        font-size: 1rem;
      }

      button {
        border: none;
        border-radius: 999px;
        cursor: pointer;
        font-size: 0.95rem;
      }

      .add-btn {
        padding: 0.8rem 1rem;
        background: #2563eb;
        color: white;
      }

      .toolbar {
        display: flex;
        justify-content: flex-end;
        margin-bottom: 1rem;
      }

      .clear-btn {
        padding: 0.55rem 0.9rem;
        background: #e5e7eb;
        color: #374151;
      }

      .clear-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      ul {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        flex-direction: column;
        gap: 0.7rem;
      }

      .todo-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        padding: 0.85rem 0.95rem;
        border: 1px solid #e5e7eb;
        border-radius: 0.9rem;
        background: #f9fafb;
      }

      .todo-main {
        display: flex;
        align-items: center;
        gap: 0.7rem;
        flex: 1;
      }

      .todo-item.completed .todo-text {
        color: #6b7280;
        text-decoration: line-through;
      }

      .check-btn,
      .delete-btn {
        width: 2rem;
        height: 2rem;
        display: grid;
        place-items: center;
      }

      .check-btn {
        background: #dcfce7;
        color: #15803d;
      }

      .delete-btn {
        background: #fee2e2;
        color: #b91c1c;
      }

      .empty-state {
        margin: 1rem 0 0;
        color: #6b7280;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main class="app">
      <h1>Todo List</h1>
      <form id="todo-form">
        <input id="todo-input" type="text" placeholder="What needs to be done?" autocomplete="off" required />
        <button class="add-btn" type="submit">Add</button>
      </form>
      <div class="toolbar">
        <button class="clear-btn" id="clear-completed" type="button">Clear completed</button>
      </div>
      <ul id="todo-list"></ul>
      <p class="empty-state" id="empty-state">No tasks yet. Add one above.</p>
    </main>

    <script>
      const storageKey = "basic-todo-list";
      const form = document.getElementById("todo-form");
      const input = document.getElementById("todo-input");
      const todoList = document.getElementById("todo-list");
      const emptyState = document.getElementById("empty-state");
      const clearCompletedBtn = document.getElementById("clear-completed");

      let todos = JSON.parse(localStorage.getItem(storageKey) || "[]");

      function saveTodos() {
        localStorage.setItem(storageKey, JSON.stringify(todos));
        render();
      }

      function render() {
        todoList.innerHTML = "";

        if (todos.length === 0) {
          emptyState.style.display = "block";
          clearCompletedBtn.disabled = true;
          return;
        }

        emptyState.style.display = "none";
        clearCompletedBtn.disabled = !todos.some((todo) => todo.completed);

        todos.forEach((todo) => {
          const li = document.createElement("li");
          li.className = `todo-item${todo.completed ? " completed" : ""}`;

          li.innerHTML = `
            <div class="todo-main">
              <button class="check-btn" type="button" data-action="toggle" data-id="${todo.id}" aria-label="Mark as complete">
                ${todo.completed ? "✓" : "○"}
              </button>
              <span class="todo-text">${todo.text}</span>
            </div>
            <button class="delete-btn" type="button" data-action="delete" data-id="${todo.id}" aria-label="Delete task">✕</button>
          `;

          todoList.appendChild(li);
        });
      }

      function addTodo(text) {
        const trimmed = text.trim();
        if (!trimmed) return;

        todos.unshift({
          id: Date.now(),
          text: trimmed,
          completed: false,
        });

        saveTodos();
        input.value = "";
        input.focus();
      }

      function toggleTodo(id) {
        todos = todos.map((todo) =>
          todo.id === id ? { ...todo, completed: !todo.completed } : todo
        );
        saveTodos();
      }

      function deleteTodo(id) {
        todos = todos.filter((todo) => todo.id !== id);
        saveTodos();
      }

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        addTodo(input.value);
      });

      todoList.addEventListener("click", (event) => {
        const button = event.target.closest("button");
        if (!button) return;

        const id = Number(button.dataset.id);
        const action = button.dataset.action;

        if (action === "toggle") {
          toggleTodo(id);
        } else if (action === "delete") {
          deleteTodo(id);
        }
      });

      clearCompletedBtn.addEventListener("click", () => {
        todos = todos.filter((todo) => !todo.completed);
        saveTodos();
      });

      render();
    </script>
  </body>
</html>
